    <text x="70" y="290" fill="#f0f6fc" font-size="25" font-weight="700">31</text>
  
  
    <rect x="338" y="234" width="250" height="74" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="356" y="262" fill="#8b949e" font-size="13">total forks</text>
    <text x="356" y="290" fill="#f0f6fc" font-size="25" font-weight="700">216</text>
  

