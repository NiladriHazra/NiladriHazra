name: update profile signal

on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/scripts/update-profile-signal.mjs"
      - ".github/workflows/update-profile-signal.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: update README signal blocks
        run: node .github/scripts/update-profile-signal.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
      - name: commit changes
        run: |
          if ! git diff --quiet README.md assets/profile-signal.svg assets/profile-signal-mobile.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md assets/profile-signal.svg assets/profile-signal-mobile.svg
            git commit -m "chore: update profile signal"
            git push
          fi
